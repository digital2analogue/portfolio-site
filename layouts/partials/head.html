<meta charset="utf-8">
<meta name="viewport" content="width=device-width">

<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>

<!-- Theme CSS first -->
{{ partialCached "head/css.html" . }}

<!-- Custom overrides AFTER theme CSS so our variables win -->
{{ $custom := resources.Get "css/custom.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $custom.RelPermalink }}" integrity="{{ $custom.Data.Integrity }}">

<!-- Font imports: Space Grotesk (headings/nav) + Spectral (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

{{ if site.Params.accentColor }}
<style>
  :root {
    --accent-color: {{ site.Params.accentColor }};
  }
  {{ if site.Params.accentColorDark }}
  [data-theme="dark"] {
    --accent-color: {{ site.Params.accentColorDark }};
  }
  {{ end }}
</style>
{{ end }}

{{ template "_internal/google_analytics.html" . }}

{{ partialCached "head/js.html" . }}
